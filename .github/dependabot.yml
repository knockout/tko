version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Hold version bumps for 2 days after publish so a freshly compromised
    # release has time to be yanked / flagged before Dependabot opens the
    # PR. Security updates ignore cooldown and ship immediately, so CVE
    # response time is unaffected. The dark-factory thesis: a low-level
    # framework with an unknown audience cannot afford supply-chain blast
    # radius from same-day automated dep bumps.
    cooldown:
      default-days: 2
    ignore:
      # package will be removed
      - dependency-name: "*jasmine*"
    groups:
      # Group minor/patch devDependency updates into a single PR
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group minor/patch production dependency updates
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
    # Security updates are always opened individually (ungrouped)

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 2
