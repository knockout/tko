# Automated release via Changesets.
#
# Trigger: push to main.
#
# Flow:
#   - prepare: invoke changesets/action to open or update the
#     "chore: version packages" PR. This is the only entry point for
#     opening that PR.
#   - publish-and-tag: when no pending changesets remain (i.e. the
#     version PR was just merged), build, test, npm-publish via OIDC,
#     then create the repo-wide vX.Y.Z tag + GitHub release in one
#     gh release create call.
#
# Single human action: merge the version PR. Everything else runs
# unattended.
name: Release

on:
  push:
    branches: [main]

# Serialize releases against themselves. Two near-simultaneous main
# pushes (e.g. version-PR merge + a doc PR merge) cannot race two
# parallel publishes or tag creations.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prepare:
    name: Open or update version PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      should_publish: ${{ steps.changesets.outputs.hasChangesets == 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # changesets/action commits version bumps via the GitHub API
          # (commitMode: github-api) so we deliberately disable
          # persisted credentials — there is no `git push` from this
          # job.
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Open or update version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npx changeset version
          title: 'chore: version packages'
          commit: 'chore: version packages'
          # Required when persist-credentials: false — without this the
          # action falls back to git-cli, which has no remote auth and
          # fails the push. github-api also produces a verified commit
          # authored by github-actions[bot].
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-and-tag:
    name: Publish to npm + tag repo
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    permissions:
      # contents:write is required to push the repo-wide vX.Y.Z tag via
      # gh release create. PRs are not modified from this job.
      contents: write
      id-token: write       # npm OIDC trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        # persist-credentials defaults to true — required for the
        # post-publish tag/release step to authenticate.

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # npm trusted publishing requires npm CLI 11.5.1+
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build is gated on the publish path so doc-only / plan-only main
      # pushes do not pay the cost.
      - name: Build all packages
        run: bun run build

      # Tests run before publish so a regression caught only in the
      # browser matrix cannot ship to npm. main-build.yml runs in
      # parallel and is not a gate; this is the gate.
      - name: Run tests
        run: bun run test

      - name: Determine release version
        id: version
        run: |
          version="$(node tools/release-version.cjs)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Use changesets/action's publish path so we get its `published`
      # output as the authoritative "did anything actually go to npm"
      # signal. Without this, a plan-only / doc-only main push (which
      # also has hasChangesets == 'false') would no-op `changeset
      # publish` and then fail noisily on `gh release create` for a
      # tag that already exists.
      #
      # changeset publish creates per-package git tags by default
      # (e.g. @tko/utils@4.1.0). With the .changeset/config.json `fixed`
      # group all 27 @tko/* packages share one version, so the
      # per-package tags carry no information beyond the repo-wide
      # vX.Y.Z. We suppress them via --no-git-tag and rely solely on
      # the post-publish step below for the single tag.
      #
      # npm generates provenance attestations automatically during
      # trusted publishing from GitHub Actions.
      - name: Publish packages
        id: publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish --no-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # gh release create is a single API call that creates both the
      # release and the underlying tag ref. Gated on the action's
      # `published` output so plan-only / doc-only pushes that
      # legitimately have nothing to publish skip tag creation.
      - name: Create GitHub release
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          tag="v${VERSION}"
          # Anchor prerelease detection on canonical suffixes only —
          # avoids false positives like 1.0.0-alphabet.
          prerelease_flag=""
          case "$VERSION" in
            *-alpha|*-alpha.*|*-beta|*-beta.*|*-rc|*-rc.*)
              prerelease_flag="--prerelease"
              ;;
          esac

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$TARGET_SHA" \
            --title "TKO ${VERSION}" \
            --generate-notes \
            $prerelease_flag
