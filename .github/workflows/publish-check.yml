# Verify that all packages can be published successfully.
# Catches packaging issues (missing dist files, bad exports, etc.) before merge.
name: Publish Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Check published package layout and types
        run: bun run verify:publish-types
