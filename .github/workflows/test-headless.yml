# Workflow for checking tests
name: Check Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Install Bun directly — avoids `apt-get update` (9+ min in this
      # container) which setup-bun needs for unzip. Bun only ships .zip;
      # Python's zipfile module is always available in the Playwright image.
      - name: Install Bun
        run: |
          version=$(grep '^bun ' .tool-versions | awk '{print $2}')
          curl -fsSL -o /tmp/bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${version}/bun-linux-x64.zip"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/bun.zip').extractall('/tmp')"
          mv /tmp/bun-linux-x64/bun /usr/local/bin/
          chmod +x /usr/local/bin/bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Build
        run: bun run build

      - name: Verify ESM extensions
        run: bun run verify:esm

      - name: Run Tests
        run: bunx vitest run
        env:
          HOME: /root
          VITEST_BROWSERS: chromium,firefox,webkit
