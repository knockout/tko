# Workflow for checking tests
name: Check Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Install Bun directly — avoids `apt-get update` (9+ min in this
      # container) which setup-bun needs for unzip.
      - name: Install Bun
        run: python3 tools/install-bun.py

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Build
        run: bun run build

      - name: Verify ESM extensions
        run: bun run verify:esm

      - name: Run Tests
        run: bunx vitest run
        env:
          HOME: /root
          VITEST_BROWSERS: ${{ matrix.browser }}
