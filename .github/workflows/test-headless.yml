# Workflow for checking tests
name: Check Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium firefox webkit

      - name: Run Build
        run: make

      - name: Run Tests
        run: bunx vitest run
        env:
          VITEST_BROWSERS: chromium,firefox,webkit
