# Combined lint, format, and typecheck workflow.
name: Lint & Typecheck

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Prettier
        run: make format

      - name: Check ESLint
        run: make eslint

      - name: Build (required for tsc)
        run: make

      - name: Typecheck
        run: bunx tsc
